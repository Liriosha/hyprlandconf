source = hyprlock/colors.conf
background {
    monitor =
    path = screenshot
    blur_passes = 1
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 250, 50
    dots_size = 0.1
    dots_spacing = 0.3
    outer_color = $entry_border_color
    inner_color = $entry_background_color
    font_color = $text_color
    fade_on_empty = true

    position = 0, 20
    halign = center
    valign = center
}

label { # User
    monitor =
    text =   $USER
    color = $text_color
    font_size = 20
    font_family = $font_family
    position = 0, 50
    halign = center
    valign = bottom
}

