exec-once = hyprpaper & xdg-desktop-portal-hyprland & hypridle
# Auto reload
exec = pkill waybar; waybar -c ~/.config/hypr/waybar/config/main.json -s ~/.config/hypr/waybar/style.css
exec = pkill mako; mako -c ~/.config/hypr/mako/config

exec-once = systemctl --user start hyprpolkitagent
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
