[config]
version_check = false

[templates.m3colors]
input_path = '~/.config/hypr/matugen/colors.json'
output_path = '~/.local/state/quickshell/user/generated/colors.json'

[templates.hyprland]
input_path = '~/.config/hypr/matugen/hyprland/colors.conf'
output_path = '~/.config/hypr/hyprland/colors.conf'

[templates.hyprlock]
input_path = '~/.config/hypr/matugen/hyprlock.conf'
output_path = '~/.config/hypr/hyprlock/colors.conf'

[templates.fuzzel]
input_path = '~/.config/hypr/matugen/fuzzel/fuzzel_theme.ini'
output_path = '~/.config/hypr/fuzzel/fuzzel_theme.ini'

[templates.gtk3]
input_path = '~/.config/hypr/matugen/gtk-3.0/gtk.css'
output_path = '~/.config/gtk-3.0/gtk.css'

[templates.gtk4]
input_path = '~/.config/hypr/matugen/gtk-4.0/gtk.css'
output_path = '~/.config/gtk-4.0/gtk.css'

[templates.kde_colors]
input_path = '~/.config/hypr/matugen/kde/color.txt'
output_path = '~/.local/state/quickshell/user/generated/color.txt'

[templates.wallpaper]
input_path = '~/.config/hypr/matugen/wallpaper.txt'
output_path = '~/.local/state/quickshell/user/generated/wallpaper/path.txt'

[templates.waybar]
input_path = '~/.config/hypr/matugen/waybar.css'
output_path = '~/.config/hypr/waybar/style.css'

[templates.mako]
input_path = '~/.config/hypr/matugen/mako'
output_path = '~/.config/hypr/mako/config'
post_hook = "makoctl reload"
